name: Chartink Telegram Alerts

on:
  schedule:
    # Runs every hour at 09:30 AM, 10:30 AM, 11:30 AM, 12:30 PM, 1:30 PM, 2:30 PM, and 3:30 PM IST
    - cron: '0 4-10 * * 1-5'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache-dependency-path: '' # No dependencies to cache

      - name: Run Chartink Alert Script
        env:
          # Reads from GitHub Repository Secrets. Fallbacks are configured in the script.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_alert.py

      - name: Commit & Push Performance Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f strategy_performance.csv ]; then
            git add strategy_performance.csv
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update strategy performance report" && git push)
          fi
