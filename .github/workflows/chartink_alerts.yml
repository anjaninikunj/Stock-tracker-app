name: Chartink Telegram Alerts

on:
#   schedule:
#     # 09:30 AM IST -> 04:00 UTC (Offset to 04:05 UTC to avoid GitHub Actions congestion delay)
#     - cron: '5 4 * * 1-5'
#     # 10:30 AM IST -> 05:00 UTC (Offset to 05:05 UTC)
#     - cron: '5 5 * * 1-5'
#     # 11:30 AM IST -> 06:00 UTC (Offset to 06:05 UTC)
#     - cron: '5 6 * * 1-5'
#     # 12:30 PM IST -> 07:00 UTC (Offset to 07:05 UTC)
#     - cron: '5 7 * * 1-5'
#     # 01:30 PM IST -> 08:00 UTC (Offset to 08:05 UTC)
#     - cron: '5 8 * * 1-5'
#     # 02:30 PM IST -> 09:00 UTC (Offset to 09:05 UTC)
#     - cron: '5 9 * * 1-5'
#     # 03:30 PM IST -> 10:00 UTC (Offset to 10:05 UTC)
#     - cron: '5 10 * * 1-5'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache-dependency-path: '' # No dependencies to cache

      - name: Run Chartink Alert Script
        env:
          # Reads from GitHub Repository Secrets. Fallbacks are configured in the script.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_alert.py

      - name: Commit & Push Performance Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f strategy_performance.csv ]; then
            git add strategy_performance.csv
            if ! git diff --quiet || ! git diff --staged --quiet; then
              git commit -m "chore: update strategy performance report"
              for i in {1..5}; do
                git pull --rebase origin main && git push origin main && break
                echo "Conflict or push failed, retrying in 5 seconds..."
                sleep 5
              done
            fi
          fi
