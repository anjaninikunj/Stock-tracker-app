name: Chartink Jyoti Budhiya 15M Alerts

on:
  schedule:
    # Runs every hour at minute 30 from 10:30 AM IST to 03:30 PM IST (05:30 to 10:30 UTC)
    - cron: '30 5-10 * * 1-5'
    
    # Runs exactly at 09:30 AM IST (04:00 AM UTC)
    - cron: '0 4 * * 1-5'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache-dependency-path: '' # No dependencies to cache

      - name: Run Jyoti Budhiya Script
        env:
          # Reads from GitHub Repository Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_alert_jyoti_budhiya_15minutes.py

      - name: Commit & Push Performance Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f strategy_performance.csv ]; then
            git add strategy_performance.csv
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update strategy performance report" && git push)
          fi
