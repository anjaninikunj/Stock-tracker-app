name: Chartink Jyoti Budhiya 15M Alerts

on:
  schedule:
    # TEMPORARY TEST SCHEDULE: Runs every 15 minutes continuously
    - cron: '*/15 * * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache-dependency-path: '' # No dependencies to cache

      - name: Run Jyoti Budhiya Script
        env:
          # Reads from GitHub Repository Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_alert_jyoti_budhiya_15minutes.py

      - name: Commit & Push Performance Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f strategy_performance.csv ]; then
            git add strategy_performance.csv
            if ! git diff --quiet || ! git diff --staged --quiet; then
              git commit -m "chore: update strategy performance report"
              for i in {1..5}; do
                git pull --rebase origin main && git push origin main && break
                echo "Conflict or push failed, retrying in 5 seconds..."
                sleep 5
              done
            fi
          fi
